name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install age
        run: sudo apt-get update && sudo apt-get install -y age

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Verify release binary help
        run: ./target/release/sealhook --help

      - name: Verify crate package
        run: cargo package --locked

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    environment: crates-io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "Cargo.toml version ($version) does not match git tag ($GITHUB_REF_NAME)" >&2
            exit 1
          fi

      - name: Verify crate package
        run: cargo package --locked

      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
