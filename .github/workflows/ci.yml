name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install age
        run: sudo apt-get update && sudo apt-get install -y age

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Verify release binary help
        run: ./target/release/sealhook --help
